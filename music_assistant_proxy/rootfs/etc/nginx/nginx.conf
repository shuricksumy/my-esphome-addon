worker_processes 1;
pid /var/run/nginx.pid;
error_log /proc/1/fd/2 info;

events {
    worker_connections 1024;
}

http {
    access_log /proc/1/fd/1 combined;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8095 default_server;
        
        location / {
            # 1. Inject the token into the header
            proxy_set_header Authorization "Bearer ${MA_TOKEN}";

            # 2. Standard proxy settings
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 3. WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_http_version 1.1;

            # 4. Direct proxy pass (No resolver needed for this syntax)
            proxy_pass http://${SERVER_HOST}:${SERVER_PORT};
        }
    }
}