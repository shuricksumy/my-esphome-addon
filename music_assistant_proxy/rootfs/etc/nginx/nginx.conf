worker_processes 1;
pid /var/run/nginx.pid;
error_log /proc/1/fd/2 info;

events {
    worker_connections 1024;
}

http {
    access_log /proc/1/fd/1 combined;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8095 default_server;
        
        location / {
            # Standard headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_http_version 1.1;

            # This appends the token as a parameter.
            # $is_args adds '?' if there are no existing params, or '&' if there are.
            # $args preserves any parameters the user already sent.
            proxy_pass http://${SERVER_HOST}:${SERVER_PORT};
            # $uri?code=${MA_TOKEN}&$args;
        }
    }
}